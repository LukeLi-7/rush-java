<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 笔记助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 
                         'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-button:active {
            transform: translateY(0);
        }

        .send-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 20px;
            border-left: 4px solid #c62828;
        }

        .session-info {
            background: #e3f2fd;
            color: #1976d2;
            padding: 8px 15px;
            font-size: 12px;
            text-align: center;
            border-bottom: 1px solid #bbdefb;
        }

        .markdown-body p,
        .markdown-body ul,
        .markdown-body ol,
        .markdown-body blockquote,
        .markdown-body pre,
        .markdown-body table {
            margin-bottom: 10px;
        }

        .markdown-body p:last-child,
        .markdown-body ul:last-child,
        .markdown-body ol:last-child,
        .markdown-body blockquote:last-child,
        .markdown-body pre:last-child,
        .markdown-body table:last-child {
            margin-bottom: 0;
        }

        .markdown-body ul,
        .markdown-body ol {
            padding-left: 22px;
        }

        .markdown-body code {
            background: #f1f3f4;
            border-radius: 4px;
            padding: 2px 5px;
            font-family: SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.9em;
        }

        .markdown-body pre {
            background: #f6f8fa;
            border-radius: 8px;
            overflow-x: auto;
            padding: 12px;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
        }

        .markdown-body blockquote {
            border-left: 4px solid #d0d7de;
            color: #57606a;
            padding-left: 12px;
        }

        .markdown-body table {
            border-collapse: collapse;
            display: block;
            overflow-x: auto;
            width: 100%;
        }

        .markdown-body th,
        .markdown-body td {
            border: 1px solid #d0d7de;
            padding: 6px 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            🤖 AI 笔记助手
        </div>
        <div class="session-info" id="sessionInfo">
            会话 ID: <span id="sessionId">未开始</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message ai">
                <div class="message-content">
                    你好！我是你的 AI 笔记助手。我可以帮你整理笔记、记录重要信息，有什么可以帮你的吗？
                </div>
            </div>
        </div>
        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="输入消息..." 
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-button" id="sendButton" onclick="sendMessage()">
                发送
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script>
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        let currentSessionId = null;
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const chatMessages = document.getElementById('chatMessages');
        const sessionIdElement = document.getElementById('sessionId');

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            // 禁用输入和按钮
            chatInput.disabled = true;
            sendButton.disabled = true;
            sendButton.innerHTML = '<span class="loading"></span>';

            // 添加用户消息到聊天窗口
            addMessage(message, 'user');
            chatInput.value = '';

            // 创建 AI 消息占位符
            const aiMessageDiv = addMessage('', 'ai', true);
            const aiContentDiv = aiMessageDiv.querySelector('.message-content');
            let fullReply = '';

            // 使用 Fetch API 发送请求并处理 SSE
            fetch('/api/chat/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: message,
                    sessionId: currentSessionId,
                    userId: null
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('网络响应失败');
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                function readStream() {
                    return reader.read().then(({ done, value }) => {
                        if (done) {
                            console.log('SSE 流结束');
                            finishMessage();
                            return;
                        }

                        // 解码数据
                        buffer += decoder.decode(value, { stream: true });
                        
                        // 处理 SSE 事件
                        const lines = buffer.split('\n\n');
                        buffer = lines.pop(); // 保留不完整的数据
                        
                        for (const line of lines) {
                            processSSEEvent(line, aiContentDiv);
                        }
                        
                        return readStream();
                    });
                }
                
                return readStream();
            })
            .catch(error => {
                console.error('请求失败:', error);
                showError('网络错误，请稍后重试');
                aiContentDiv.textContent = '错误: ' + error.message;
            })
            .finally(() => {
                finishMessage();
            });

            function processSSEEvent(eventText, contentDiv) {
                const lines = eventText.split('\n');
                let eventName = '';
                let eventData = '';
                
                for (const line of lines) {
                    if (line.startsWith('event:')) {
                        eventName = line.substring(6).trim();
                    } else if (line.startsWith('data:')) {
                        eventData = line.substring(5).trim();
                    }
                }
                
                if (!eventData) return;
                
                switch(eventName) {
                    case 'session':
                        // 更新会话 ID
                        if (!currentSessionId) {
                            currentSessionId = eventData;
                            sessionIdElement.textContent = currentSessionId;
                        }
                        break;
                        
                    case 'start':
                        contentDiv.textContent = '思考中...';
                        break;
                        
                    case 'message':
                        // 累积回复内容
                        fullReply += (fullReply ? '\n' : '') + eventData;
                        renderMarkdown(contentDiv, fullReply);
                        // 滚动到底部
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                        break;
                        
                    case 'complete':
                        console.log('消息处理完成');
                        break;
                        
                    case 'error':
                        showError(eventData);
                        contentDiv.textContent = eventData;
                        break;
                }
            }

            function finishMessage() {
                // 恢复输入和按钮
                chatInput.disabled = false;
                sendButton.disabled = false;
                sendButton.textContent = '发送';
                chatInput.focus();
                
                // 如果内容为空，显示提示
                if (aiContentDiv.textContent === '' || aiContentDiv.textContent === '思考中...') {
                    aiContentDiv.textContent = '抱歉，我没有收到回复。';
                }
            }
        }

        function addMessage(content, type, isPlaceholder = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = type === 'ai' ? 'message-content markdown-body' : 'message-content';
            if (type === 'ai') {
                renderMarkdown(contentDiv, content);
            } else {
                contentDiv.textContent = content;
            }
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return messageDiv;
        }

        function renderMarkdown(contentDiv, markdownText) {
            if (!markdownText) {
                contentDiv.textContent = '';
                return;
            }

            const unsafeHtml = marked.parse(markdownText);
            contentDiv.innerHTML = DOMPurify.sanitize(unsafeHtml);
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            chatMessages.appendChild(errorDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // 3秒后自动消失
            setTimeout(() => {
                errorDiv.remove();
            }, 3000);
        }

        // 页面加载完成后聚焦输入框
        window.onload = function() {
            chatInput.focus();
        };
    </script>
</body>
</html>
